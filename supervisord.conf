[supervisord]
nodaemon=true
user=root
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid

[program:dotnet-app]
command=/usr/bin/dotnet /app/dotnet-app/MaschinenDataein.dll
directory=/app/dotnet-app
autostart=true
autorestart=true
stderr_logfile=/var/log/supervisor/dotnet-app.err.log
stdout_logfile=/var/log/supervisor/dotnet-app.out.log
priority=1

[program:python-pipeline]
command=python3 /app/python-app/main.py
directory=/app/python-app
autostart=true
autorestart=true
stderr_logfile=/var/log/supervisor/python-pipeline.err.log
stdout_logfile=/var/log/supervisor/python-pipeline.out.log
priority=2
